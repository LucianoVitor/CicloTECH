    <script>
      // Prevent theme flash: apply saved theme before React mounts
      (function () {
        try {
          var t = localStorage.getItem('ciclo-theme');
          if (t === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
